project_name: codex_adam_connect
project_type: application
risk_tier: medium
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: governed promotion
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: true
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - docs/architecture.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
exceptions: []
agent_controls:
  applicable: true
  autonomy_level: A2
  model_registry:
    - codex-cli-local
  prompt_registry:
    - AGENTS.md
